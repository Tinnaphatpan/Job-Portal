server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: job-portal-api

  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public
        jdbc:
          lob:
            non_contextual_creation: true

  data:
    redis:
      url: ${REDIS_URL}
      timeout: 60000ms

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB


app:
  jwt:
    secret: ${JWT_SECRET}
    expiration: 86400000
    refresh-expiration: 604800000
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  storage:
    url: ${SUPABASE_URL:}
    key: ${SUPABASE_SERVICE_KEY:}
    bucket: ${SUPABASE_BUCKET:resumes}

cors:
  allowed-origins: ${FRONTEND_URL:http://localhost:3000}
